name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # required for `softprops/action-gh-release` to upload assets

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 is Apple Silicon; we install python.org's universal2
          # Python so PyInstaller emits a single binary that runs natively
          # on both arm64 and Intel Macs. macos-13 (x86-only runners) is
          # consistently queue-starved on GHA and not worth the wait when
          # universal2 covers the same userbase.
          - runner: macos-14
            target: macos-universal2
            artifact: holo-macos-universal2
            python: universal2
          - runner: ubuntu-latest
            target: linux-x86_64
            artifact: holo-linux-x86_64
            python: setup-python
          - runner: windows-latest
            target: windows-x86_64
            artifact: holo-windows-x86_64.exe
            python: setup-python

    steps:
      - uses: actions/checkout@v4

      # actions/setup-python doesn't ship a universal2 Python on macOS,
      # so on the macos-14 runner we install python.org's universal2 PKG
      # directly. The interpreter ends up at
      # /Library/Frameworks/Python.framework/Versions/3.12/bin/python3
      # and PyInstaller picks up its arch automatically.
      - name: Set up universal2 Python (macOS)
        if: matrix.python == 'universal2'
        run: |
          PY_VER=3.12.7
          curl -fsSL -o python-installer.pkg \
            "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-macos11.pkg"
          sudo installer -pkg python-installer.pkg -target /
          PY_BIN=/Library/Frameworks/Python.framework/Versions/3.12/bin
          echo "${PY_BIN}" >> "$GITHUB_PATH"
          "${PY_BIN}/python3" -c 'import platform; print("arch:", platform.mac_ver(), platform.machine())'
          file "${PY_BIN}/python3"

      - name: Set up Python (Linux/Windows)
        if: matrix.python == 'setup-python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bookmarklet/package-lock.json

      - name: Build bookmarklet
        working-directory: bookmarklet
        run: |
          npm ci
          npm run build

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # On macOS universal2, any package without a universal2 wheel on
      # PyPI ends up single-arch (arm64 since the runner is arm64), and
      # PyInstaller's universal2 build refuses to bundle a single-arch
      # .so. `delocate-fuse` is the canonical workaround: download both
      # arm64 and x86_64 wheels, fuse the binaries into a universal2
      # wheel, reinstall. Works for any precompiled native ext (C,
      # Rust, …) without requiring a build toolchain in CI.
      - name: Fuse native extensions to universal2 (macOS)
        if: matrix.python == 'universal2'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          pip install delocate
          # Packages whose .so files are not universal2 today. Add new
          # offenders here when they surface in the post-build lipo
          # check or PyInstaller's IncompatibleBinaryArchError.
          PACKAGES="websockets pydantic-core"
          mkdir -p /tmp/wheels
          for pkg in $PACKAGES; do
            echo "::group::fuse $pkg"
            rm -rf "/tmp/wheels/$pkg-arm64" "/tmp/wheels/$pkg-x86_64"
            mkdir -p "/tmp/wheels/$pkg-arm64" "/tmp/wheels/$pkg-x86_64"
            pip download --no-deps --only-binary=:all: \
              --platform macosx_11_0_arm64 \
              --python-version 3.12 \
              --dest "/tmp/wheels/$pkg-arm64" "$pkg"
            pip download --no-deps --only-binary=:all: \
              --platform macosx_10_12_x86_64 \
              --python-version 3.12 \
              --dest "/tmp/wheels/$pkg-x86_64" "$pkg"
            arm_whl=$(ls "/tmp/wheels/$pkg-arm64"/*.whl)
            x86_whl=$(ls "/tmp/wheels/$pkg-x86_64"/*.whl)
            # delocate-fuse rewrites the first arg in place to become
            # universal2 by merging the second arg's binaries. Wheel
            # filename keeps the arm64 platform tag — that's fine, we
            # `--force-reinstall --no-deps` so pip ignores tag
            # constraints; only the bundled .so contents matter.
            delocate-fuse "$arm_whl" "$x86_whl"
            pip install --upgrade --force-reinstall --no-deps "$arm_whl"
            echo "::endgroup::"
          done
          # Verify every .so in those packages is now universal2.
          for pkg in $PACKAGES; do
            mod=$(echo "$pkg" | tr '-' '_')
            pkg_dir=$(python -c "import ${mod}, os; print(os.path.dirname(${mod}.__file__))")
            for so in $(find "$pkg_dir" -name '*.so'); do
              archs=$(lipo -archs "$so")
              case "$archs" in
                *arm64*x86_64*|*x86_64*arm64*) echo "✓ $so ($archs)" ;;
                *) echo "✗ $so is $archs (expected universal2)"; exit 1 ;;
              esac
            done
          done

      # Tests run on every PR via ci.yml. The release workflow's job is
      # to build binaries; we only re-run pytest on darwin where the
      # current suite has been validated. Linux / Windows will get
      # platform-specific test runs once we port the macOS-leaning bits.
      - name: Run tests
        if: runner.os == 'macOS'
        run: pytest -ra

      - name: Build binary with PyInstaller
        env:
          HOLO_TARGET_ARCH: ${{ matrix.python == 'universal2' && 'universal2' || '' }}
        run: pyinstaller --clean holo.spec

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out
          cp dist/holo "out/${{ matrix.artifact }}"
          chmod +x "out/${{ matrix.artifact }}"
          ls -la out/
          file "out/${{ matrix.artifact }}"
          # Sanity-check the universal2 build — should report two arches.
          if [ "${{ matrix.python }}" = "universal2" ]; then
            archs=$(lipo -archs "out/${{ matrix.artifact }}")
            echo "lipo archs: ${archs}"
            case "${archs}" in
              *arm64*x86_64*|*x86_64*arm64*) echo "✓ universal2 confirmed" ;;
              *) echo "✗ expected universal2, got '${archs}'"; exit 1 ;;
            esac
          fi
          ./out/${{ matrix.artifact }} --version

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item dist\holo.exe "out\${{ matrix.artifact }}"
          Get-ChildItem out
          & ".\out\${{ matrix.artifact }}" --version

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p assets
          find artifacts -type f -exec cp {} assets/ \;
          ls -la assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
